<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Hub Contest</title>
    <style>
        :root { 
            --header-bg: #000; 
            --button-primary-bg: #ffc107; 
            --button-primary-text: #000; 
            --button-admin-bg: #dc3545; 
            --secondary-color: #6c757d; 
            --light-color: #f8f9fa;
            --success-color: #28a745;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            background-color: var(--light-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 1rem 0; 
            box-sizing: border-box;
        }
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background-color: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            overflow: hidden; 
        }
        header { 
            background-color: var(--header-bg); 
            color: white; 
            text-align: center; 
            padding: 0.5rem; 
        }
        header img { 
            height: 60px; 
            width: auto; 
            display: block; 
            margin: 0 auto; 
        }
        main { padding: 1.5rem; }
        .screen { display: none; }
        .screen.active { display: block; }
        h2, h3 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="text"], input[type="email"] { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        select { 
            width:100%; 
            padding: 0.5rem; 
            border-radius: 4px; 
            border: 1px solid #ccc; 
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 0.75rem; 
            border: none; 
            border-radius: 4px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: center; 
            text-decoration: none; 
            margin-top: 1rem; 
        }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; margin: 0; width: auto; }
        .btn-primary { background-color: var(--button-primary-bg); color: var(--button-primary-text); }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-admin { background-color: var(--button-admin-bg); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .admin-controls { border: 1px solid #eee; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
        .admin-contestant-list-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid #eee; }
        .contestant-list { list-style-type: none; padding: 0; }
        .contestant-item { display: flex; align-items: center; background-color: #fdfdfd; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
        .contestant-item input[type="checkbox"] { width: 1.5em; height: 1.5em; margin-right: 1rem; }
        .contestant-item label { font-weight: 500; flex-grow: 1; }
        #voting-status { text-align: center; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 1rem; }
        #loading-spinner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--button-primary-bg); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-spinner">
        <div class="spinner"></div>
        <p style="margin-top: 1rem;">Caricamento...</p>
    </div>

    <div class="app-container">
        <header id="app-header">
            <img src="https://raw.githubusercontent.com/Scream1986/festival-voto/main/Logo.png" alt="Vocal Hub Logo">
        </header>
        <main>
            <div id="login-screen" class="screen active">
                <h2>Benvenuto</h2>
                <p style="text-align: center; color: #666;">Inserisci la tua Email per votare o il Codice Admin per gestire.</p>
                <div class="form-group">
                    <label for="user-input">Email o Codice Admin</label>
                    <input type="text" id="user-input" placeholder="tua@email.com o Codice" autocomplete="off">
                </div>
                <button id="login-btn" class="btn btn-primary">Avanti</button>
            </div>

            <div id="otp-screen" class="screen">
                <h2>Verifica Codice</h2>
                <p id="otp-info" style="text-align: center; color: #666;">Inserisci il codice che abbiamo inviato a <strong id="otp-email"></strong>.</p>
                <div class="form-group">
                    <label for="otp-input">Codice di verifica</label>
                    <input type="text" id="otp-input" placeholder="123456" autocomplete="off">
                </div>
                <button id="otp-btn" class="btn btn-primary">Conferma</button>
                <button id="back-to-login-btn" class="btn btn-secondary">Indietro</button>
            </div>

            <div id="main-screen" class="screen">
                <div id="admin-view" style="display: none;">
                    <h2>Pannello Amministratore</h2>
                    <div class="admin-controls">
                        <h3>Gestione Serate</h3>
                        <label for="active-event-select">Seleziona la serata da gestire:</label>
                        <select id="active-event-select"><option value="serata_1">Serata 1</option><option value="serata_2">Serata 2</option></select>
                        <button id="toggle-voting-btn" class="btn btn-secondary"></button>
                    </div>
                    <div class="admin-controls">
                        <h3>Azioni e Risultati</h3>
                        <button id="manage-contestants-btn" class="btn btn-secondary">Gestisci Partecipanti</button>
                        <button id="general-ranking-btn" class="btn btn-primary">Classifica Generale</button>
                    </div>
                    <button id="logout-btn-admin" class="btn btn-admin" style="margin-top: 2rem;">Esci</button>
                </div>

                <div id="public-view" style="display: none;">
                    <h2 id="public-welcome">Area Votazione</h2>
                    <div id="voting-status"></div>
                    <div id="public-voting-area"></div>
                    <button id="logout-btn-public" class="btn btn-secondary">Esci</button>
                </div>
            </div>

            <div id="manage-screen" class="screen">
                <h2>Gestione Partecipanti</h2>
                <div id="admin-contestant-list-container"></div>
                <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                    <input type="text" id="new-contestant-name" placeholder="Nome nuovo partecipante" style="flex-grow: 1;">
                    <button id="add-contestant-btn" class="btn btn-primary btn-sm">Aggiungi</button>
                </div>
                <button id="back-to-admin-btn" class="btn btn-secondary" style="margin-top: 2rem;">Torna al Pannello</button>
            </div>
        </main>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // ---------- CONFIGURAZIONE ----------
    const SUPABASE_URL = 'https://funebgzoioakkuflbeln.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpcSNTI6InN1cGFzZSIiLCJyZWYiOiJmdW5lYmd6b2lvYWtrdWZsYmVsciLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc1NTk1NDAzNywiZXhwIjoyMDcxNTMwMDM3fQ.0CYThDbWz5FTP-vTikitX_4oBjxD2lHQXprH7cJj-9M';
    const ADMIN_CODE = 'VocalHubAdmin2024';

    // ---------- ELEMENTI UI ----------
    const screens = { login: document.getElementById('login-screen'), otp: document.getElementById('otp-screen'), main: document.getElementById('main-screen'), manage: document.getElementById('manage-screen') };
    const loadingSpinner = document.getElementById('loading-spinner');
    
    // ---------- STATO APPLICAZIONE (CACHE LOCALE) ----------
    let state = {
        currentUser: null,
        isAdmin: false,
        contestants: [],
        serateStatus: { serata_1: { is_open: false }, serata_2: { is_open: false } },
        userHasVotedFor: [] // Es: ['serata_1']
    };

    // ---------- INIZIALIZZAZIONE SUPABASE ----------
    const { createClient } = window.supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ---------- FUNZIONI UTILI----------
    const showLoading = (isLoading) => { loadingSpinner.style.display = isLoading ? 'flex' : 'none'; };
    const navigateTo = (screenId) => { Object.values(screens).forEach(s => s.classList.remove('active')); if(screens[screenId]) screens[screenId].classList.add('active'); };
    const showAlert = (message) => alert(message);

    // ---------- FUNZIONI PRINCIPALI ----------

    // Carica i dati essenziali da Supabase e popola lo stato locale
    const initializeAppData = async () => {
        showLoading(true);
        // 1. Carica Cantanti
        const { data: contestantsData, error: contestantsError } = await supabase.from('cantanti').select('nome').order('nome');
        if(contestantsError) showAlert("Errore caricamento cantanti.");
        else state.contestants = contestantsData.map(c => c.nome);

        // 2. Carica Stato Serate
        const { data: serateData, error: serateError } = await supabase.from('serate_status').select('*');
        if(serateError) showAlert("Errore caricamento stato serate.");
        else {
            serateData.forEach(s => {
                state.serateStatus[s.id] = { is_open: s.is_open };
            });
        }
        
        // 3. Se è un votante, carica la sua storia di voto
        if (!state.isAdmin && state.currentUser) {
            const { data: votiData, error: votiError } = await supabase.from('votanti').select('voti_serata_1, voti_serata_2').eq('user_id', state.currentUser.id).single();
            if (votiData) {
                state.userHasVotedFor = [];
                if (votiData.voti_serata_1 && votiData.voti_serata_1.length > 0) state.userHasVotedFor.push('serata_1');
                if (votiData.voti_serata_2 && votiData.voti_serata_2.length > 0) state.userHasVotedFor.push('serata_2');
            }
        }
        showLoading(false);
    };

    const renderUI = () => {
        if (state.isAdmin) {
            screens.main.querySelector('#admin-view').style.display = 'block';
            screens.main.querySelector('#public-view').style.display = 'none';
            renderAdminView();
        } else {
            screens.main.querySelector('#admin-view').style.display = 'none';
            screens.main.querySelector('#public-view').style.display = 'block';
            renderPublicView();
        }
        navigateTo('main');
    };
    
    // ---------- VISTA ADMIN ----------
    const renderAdminView = () => {
        const select = document.getElementById('active-event-select');
        const toggleBtn = document.getElementById('toggle-voting-btn');
        const manageBtn = document.getElementById('manage-contestants-btn');
        const activeSerataId = select.value;
        const serataStatus = state.serateStatus[activeSerataId];
        const anySerataOpen = Object.values(state.serateStatus).some(s => s.is_open);

        const serataName = activeSerataId.replace('_', ' ');
        toggleBtn.textContent = serataStatus.is_open ? `Chiudi Votazioni per ${serataName}` : `Apri Votazioni per ${serataName}`;
        toggleBtn.className = serataStatus.is_open ? 'btn btn-admin' : 'btn btn-success';
        
        // Puoi aprire una serata solo se nessun'altra è aperta
        toggleBtn.disabled = anySerataOpen && !serataStatus.is_open;
        manageBtn.disabled = anySerataOpen;
    };

    const handleToggleVoting = async () => {
        const select = document.getElementById('active-event-select');
        const activeSerataId = select.value;
        const newStatus = !state.serateStatus[activeSerataId].is_open;
        
        showLoading(true);
        const { error } = await supabase.from('serate_status').update({ is_open: newStatus }).eq('id', activeSerataId);
        showLoading(false);

        if(error) {
            showAlert("Errore durante l'aggiornamento dello stato della serata.");
        } else {
            state.serateStatus[activeSerataId].is_open = newStatus;
            showAlert(`Votazioni per ${activeSerataId.replace('_', ' ')} ora ${newStatus ? 'APERTE' : 'CHIUSE'}`);
            renderAdminView();
        }
    };
    
    const renderAdminContestantList = () => {
        const container = document.getElementById('admin-contestant-list-container');
        let html = state.contestants.map(name => 
            `<div class="admin-contestant-list-item"><span>${name}</span><button class="btn btn-admin btn-sm btn-remove" data-name="${name}">Rimuovi</button></div>`
        ).join('');
        container.innerHTML = html || '<p style="text-align:center; color:#666;">Nessun partecipante.</p>';
    };
    
    const handleAddContestant = async () => {
        const input = document.getElementById('new-contestant-name');
        const newName = input.value.trim();
        if(!newName) return;
        if(state.contestants.map(c => c.toLowerCase()).includes(newName.toLowerCase())) return showAlert("Cantante già presente.");

        showLoading(true);
        const { error } = await supabase.from('cantanti').insert({ nome: newName });
        showLoading(false);

        if(error) showAlert("Errore nell'aggiunta del cantante.");
        else {
            state.contestants.push(newName);
            state.contestants.sort();
            input.value = '';
            renderAdminContestantList();
        }
    };

    const handleRemoveContestant = async (e) => {
        if(!e.target.classList.contains('btn-remove')) return;
        const nameToRemove = e.target.dataset.name;
        if(confirm(`Rimuovere ${nameToRemove}?`)) {
            showLoading(true);
            const { error } = await supabase.from('cantanti').delete().eq('nome', nameToRemove);
            showLoading(false);
            if(error) showAlert("Errore nella rimozione del cantante.");
            else {
                state.contestants = state.contestants.filter(name => name !== nameToRemove);
                renderAdminContestantList();
            }
        }
    };
    
    // ---------- VISTA VOTANTE ----------
    const renderPublicView = () => {
        const welcome = document.getElementById('public-welcome');
        const statusDiv = document.getElementById('voting-status');
        const votingArea = document.getElementById('public-voting-area');
        
        welcome.textContent = `Ciao, ${state.currentUser.email.split('@')[0]}`;
        
        const openSerataEntry = Object.entries(state.serateStatus).find(([, status]) => status.is_open);

        if (!openSerataEntry) {
            statusDiv.textContent = 'VOTAZIONI CHIUSE';
            statusDiv.style.color = 'red';
            votingArea.innerHTML = '';
            return;
        }

        const openSerataId = openSerataEntry[0];
        const serataName = openSerataId.replace('_', ' ');
        statusDiv.textContent = `VOTAZIONI APERTE - ${serataName}`;
        statusDiv.style.color = 'green';
        
        if (state.userHasVotedFor.includes(openSerataId)) {
            votingArea.innerHTML = `<p style="text-align:center; font-weight:bold;">Grazie per aver votato per la ${serataName}!</p>`;
        } else {
            let html = `<p>Puoi esprimere fino a <strong>3 preferenze</strong>.</p><ul class="contestant-list">`;
            state.contestants.forEach((name, index) => {
                html += `<li class="contestant-item"><input type="checkbox" id="contestant-${index}" value="${name}"><label for="contestant-${index}">${name}</label></li>`;
            });
            html += `</ul><button id="vote-btn" class="btn btn-primary" data-serata="${openSerataId}">Invia Voto</button>`;
            votingArea.innerHTML = html;
        }
    };
    
    const handleVote = async (e) => {
        if(e.target.id !== 'vote-btn') return;
        
        const serataId = e.target.dataset.serata;
        const selected = document.querySelectorAll('#public-voting-area input:checked');
        
        if (selected.length === 0 || selected.length > 3) {
            return showAlert('Devi selezionare da 1 a 3 preferenze.');
        }

        const voti = Array.from(selected).map(s => s.value);
        
        showLoading(true);
        const colonnaVoti = `voti_${serataId}`;
        const { error } = await supabase.from('votanti').upsert({ user_id: state.currentUser.id, [colonnaVoti]: voti }, { onConflict: 'user_id' });
        showLoading(false);
        
        if(error) {
            showAlert("Si è verificato un errore, il tuo voto non è stato registrato.");
        } else {
            showAlert("Grazie per aver votato!");
            state.userHasVotedFor.push(serataId);
            renderPublicView();
        }
    };
    
    // ---------- GESTIONE ACCESSO E USCITA ----------
    document.getElementById('login-btn').addEventListener('click', async () => {
        const input = document.getElementById('user-input').value.trim();
        if (!input) return;

        if (input === ADMIN_CODE) {
            state.isAdmin = true;
            state.currentUser = 'admin';
            await initializeAppData();
            renderUI();
        } else { // È una email
            showLoading(true);
            const { error } = await supabase.auth.signInWithOtp({ email: input });
            showLoading(false);
            if(error) showAlert("Email non valida o errore. Riprova.");
            else {
                document.getElementById('otp-email').textContent = input;
                navigateTo('otp');
            }
        }
    });

    document.getElementById('otp-btn').addEventListener('click', async () => {
        const email = document.getElementById('otp-email').textContent;
        const otp = document.getElementById('otp-input').value.trim();
        if(!otp) return;
        showLoading(true);
        const { data, error } = await supabase.auth.verifyOtp({ email, token: otp, type: 'email'});
        showLoading(false);
        if(error) showAlert("Codice non valido o scaduto.");
        // Se il codice è valido, onAuthStateChange si occuperà del resto
    });

    supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN') {
            state.isAdmin = false;
            state.currentUser = session.user;
            await initializeAppData();
            renderUI();
        } else if (event === 'SIGNED_OUT') {
            state = { currentUser: null, isAdmin: false, contestants: [], serateStatus: { serata_1: { is_open: false }, serata_2: { is_open: false } }, userHasVotedFor: [] };
            navigateTo('login');
        }
    });

    const handleLogout = async () => {
        if(state.isAdmin) {
             state = { currentUser: null, isAdmin: false, contestants: [], serateStatus: { serata_1: { is_open: false }, serata_2: { is_open: false } }, userHasVotedFor: [] };
             navigateTo('login');
        } else {
            await supabase.auth.signOut();
        }
    };
    
    // ---------- EVENT LISTENERS ----------
    document.getElementById('logout-btn-admin').addEventListener('click', handleLogout);
    document.getElementById('logout-btn-public').addEventListener('click', handleLogout);
    document.getElementById('back-to-login-btn').addEventListener('click', () => navigateTo('login'));
    document.getElementById('toggle-voting-btn').addEventListener('click', handleToggleVoting);
    document.getElementById('active-event-select').addEventListener('change', renderAdminView);
    document.getElementById('manage-contestants-btn').addEventListener('click', () => { renderAdminContestantList(); navigateTo('manage'); });
    document.getElementById('back-to-admin-btn').addEventListener('click', () => navigateTo('main'));
    document.getElementById('add-contestant-btn').addEventListener('click', handleAddContestant);
    document.getElementById('admin-contestant-list-container').addEventListener('click', handleRemoveContestant);
    document.getElementById('public-voting-area').addEventListener('click', handleVote);

    // Gestione Classifica
    document.getElementById('general-ranking-btn').addEventListener('click', async () => {
        showLoading(true);
        const { data: votiData, error } = await supabase.from('votanti').select('voti_serata_1, voti_serata_2');
        showLoading(false);
        if(error) return showAlert("Errore nel caricare i dati dei voti.");
        
        const totalVotes = {};
        state.contestants.forEach(name => {
            totalVotes[name] = 0;
        });

        votiData.forEach(row => {
            (row.voti_serata_1 || []).forEach(nome => { if(totalVotes[nome] !== undefined) totalVotes[nome]++; });
            (row.voti_serata_2 || []).forEach(nome => { if(totalVotes[nome] !== undefined) totalVotes[nome]++; });
        });

        const sorted = Object.entries(totalVotes).sort(([, a], [, b]) => b - a);
        let resultsMessage = '--- CLASSIFICA GENERALE ---\n\n';
        sorted.forEach(([name, count], index) => {
            resultsMessage += `${index + 1}. ${name}: ${count} voti\n`;
        });
        showAlert(resultsMessage);
    });

});
</script>
</body>
</html>
