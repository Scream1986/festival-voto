<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Hub Contest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --header-bg: #000; --button-primary-bg: #ffc107; --button-primary-text: #000; --button-admin-bg: #dc3545; --button-danger-bg: #b30000; --secondary-color: #6c757d; --light-color: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: var(--light-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem 0; }
        .app-container { width: 100%; max-width: 480px; background-color: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); overflow: hidden; }
        header { background-color: var(--header-bg); color: white; text-align: center; padding: 0.5rem; }
        header img { height: 60px; width: auto; display: block; margin: 0 auto; }
        main { padding: 1.5rem; }
        .screen { display: none; }
        .screen.active { display: block; }
        h2, h3 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .contestant-list { list-style-type: none; padding: 0; }
        .contestant-item { display: flex; align-items: center; background-color: #fdfdfd; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
        .contestant-item input[type="checkbox"] { width: 1.5em; height: 1.5em; margin-right: 1rem; }
        .contestant-item label, .admin-contestant-list-item span { font-weight: 500; flex-grow: 1; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="text"].code-input { text-align: center; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.2em; }
        .btn { display: block; width: 100%; padding: 0.75rem; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-top: 1rem; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; margin: 0; width: auto; }
        .btn-primary { background-color: var(--button-primary-bg); color: var(--button-primary-text); }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-admin { background-color: var(--button-admin-bg); color: white; }
        .btn-danger { background-color: var(--button-danger-bg); color: white; }
        .admin-controls { border: 1px solid #eee; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
        .admin-controls h3 { margin-bottom: 1rem; }
        .admin-contestant-list-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid #eee; }
        .add-contestant-form { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
        #voting-status { text-align: center; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 1rem; }
        .vote-summary { text-align: left; background-color: #f8f9fa; padding: 1rem; border-radius: 8px; margin-top: 1rem;}
        .vote-summary h4 { margin-top: 0; text-align: center; }
        .vote-summary ul { padding-left: 20px; margin-top: 0.5rem; }
        .vote-summary p { font-style: italic; color: #6c757d; }
    </style>
</head>
<body>
    <div class="app-container">
        <header id="app-header">
            <img src="https://raw.githubusercontent.com/Scream1986/festival-voto/main/Logo.png" alt="Vocal Hub Logo">
        </header>
        <main>
            <div id="loading-screen" class="screen active">
                <h2 style="text-align:center;">Caricamento...</h2>
            </div>

            <div id="login-screen" class="screen">
                <h2>Benvenuto al Contest</h2>
                <p style="text-align: center; color: #666;">Inserisci il codice di voto di 8 cifre ricevuto all'ingresso o il codice admin.</p>
                <div class="form-group">
                    <label for="user-code">Codice Personale</label>
                    <input type="text" id="user-code" class="code-input" placeholder="00000000" autocomplete="off" maxlength="9">
                </div>
                <button id="login-btn" class="btn btn-primary">Accedi</button>
            </div>

            <div id="main-screen" class="screen">
                <div id="admin-view" style="display: none;">
                    <h2>Pannello Amministratore</h2>
                    <div class="admin-controls">
                        <h3>Stato della Serata</h3>
                        <button id="toggle-voting-btn" class="btn btn-secondary">Apri Votazioni</button>
                    </div>
                    <div class="admin-controls">
                        <h3>Azioni e Risultati</h3>
                        <button id="manage-contestants-btn" class="btn btn-secondary">Gestisci Partecipanti</button>
                        <button id="view-voters-btn" class="btn btn-secondary">Visualizza Stato Codici</button>
                        <button id="view-event-ranking-btn" class="btn btn-primary">Classifica</button>
                        <button id="setup-codes-btn" class="btn btn-admin">Attiva i 500 Codici di Voto</button>
                        <button id="reset-votes-btn" class="btn btn-danger">Reset Completo Voti e Codici</button>
                    </div>
                    <button id="logout-btn-admin" class="btn btn-admin" style="margin-top: 2rem;">Esci</button>
                </div>

                <div id="public-view" style="display: none;">
                    <h2 id="public-welcome">Area Votazione</h2>
                    <div id="voting-status"></div>
                    <div id="voting-area-container"></div>
                    <button id="logout-btn-public" class="btn btn-secondary">Esci</button>
                </div>
            </div>

            <div id="manage-screen" class="screen">
                <h2>Gestione Partecipanti</h2>
                <div id="admin-contestant-list-container"></div>
                <div class="add-contestant-form">
                    <input type="text" id="new-contestant-name" placeholder="Nome nuovo partecipante" style="flex-grow: 1;">
                    <button id="add-contestant-btn" class="btn btn-primary btn-sm">Aungi</button>
                </div>
                <button id="back-to-admin-btn" class="btn btn-secondary" style="margin-top: 2rem;">Torna al Pannello</button>
            </div>
        </main>
    </div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const SUPABASE_URL = 'https://igngvrktzevpghxwxpqw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlnbmd2cmt0emV2cGdoeHd4cHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyNDE1MzIsImV4cCI6MjA3MTgxNzUzMn0.VjVt37MQx1mGRN4vOkyOlXPFH5LKSajKNXq8HzbHD6I';
    const supabase = self.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {};
    let currentUserCode = null;

    const PREGENERATED_CODES = ["10482591","11394627","12584039","13840294","14692740","15920438","16402935","17294810","18493025","19385026","20491835","21394850","22619403","23849102","24719402","25930284","26491048","27395820","28401947","29581043","30491825","31495028","32619483","33948102","34710492","35930184","36492014","37395104","38402957","39582041","40492815","41496023","42620481","43949105","44711496","45931187","46493018","47396105","48403951","49583042","50493812","51497024","52621482","53950106","54712497","55932188","56494019","57397106","58404952","59584043","60494813","61498025","62622483","63951107","64713498","65933189","66495011","67398107","68405953","69585044","70495814","71499026","72623484","73952108","74714499","75934181","76496012","77399108","78406954","79586045","80496815","81400027","82624485","83953109","84715491","85935182","86497013","87300109","88407955","89587046","90497816","91401028","92625486","93954101","94716492","95936183","96498014","97301101","98408956","99588047","10593847","11482950","12693041","13958204","14703952","15814029","16593841","17304925","18592047","19403951","20594812","21483951","22704152","23959315","24814063","25925130","26604952","27415036","28503069","29693154","30605923","31594062","32715263","33060426","34925174","35036241","36716063","37526147","38614170","39704265","40716034","41605173","42826374","43171537","44036285","45147352","46827174","47637258","48725281","49815376","50827145","51716284","52937485","53282648","54147396","55258463","56938285","57748369","58836392","59926487","60938256","61827395","62048596","63393759","64258507","65369574","66049396","67859480","68947403","69037598","70049367","71938506","72159607","73404860","74369618","75480685","76160407","77960591","78058514","79148609","80160478","81049617","82260718","83515971","84470729","85591796","86271518","87071602","88169625","89259710","90271589","91160728","92371829","93626082","94581830","95602807","96382629","97182713","98270736","99360821","10839462","11948261","12049385","13284059","14395820","15402938","16592041","17603952","18714063","19825174","20936285","21047396","22158407","23269518","24380629","25491740","26502851","27613962","28725073","29836184","30947295","31058406","32169517","33280628","34391739","35502850","36613961","37725072","38836183","39947294","40058405","41169516","42280627","43391738","44502849","45613960","46725071","47836182","48947293","49058404","50169515","51280626","52391737","53502848","54613959","55725070","56836181","57947292","58058403","59169514","60280625","61391736","62502847","63613958","64725069","65836180","66947291","67058402","68169513","69280624","70391735","71502846","72613957","73725068","74836179","75947290","76058401","77169512","78280623","79391734","80502845","81613956","82725067","83836178","84947289","85058400","86169511","87280622","88391733","89502844","90613955","91725066","92836177","93947288","94058399","95169510","96280621","97391732","98502843","99613954","10284951","11395062","12406173","13517284","14628395","15739506","16850617","17961728","18072839","19183950","20295061","21406172","22517283","23628394","24739505","25850616","26961727","27072838","28183949","29295060","30406171","31517282","32628393","33739504","34850615","35961726","36072837","37183948","38295059","39406170","40517281","41628392","42739503","43850614","44961725","45072836","46183947","47295058","48406169","49517280","50628391","51739502","52850613","53961724","54072835","55183946","56295057","57406168","58517279","59628390","60739501","61850612","62961723","63072834","64183945","65295056","66406167","67517278","68628389","69739500","70850611","71961722","72072833","73183944","74295055","75406166","76517277","77628388","78739499","79850610","80961721","81072832","82183943","83295054","84406165","85517276","86628387","87739498","88850609","89961720","90072831","91183942","92295053","93406164","94517275","95628386","96739497","97850608","98961719","99072830","10395826","11406937","12518048","13629159","14740270","15851381","16962492","17073603","18184714","19295825","20406936","21518047","22629158","23740269","24851380","25962491","26073602","27184713","28295824","29406935","30518046","31629157","32740268","33851379","34962490","35073601","36184712","37295823","38406934","39518045","40629156","41740267","42851378","43962489","44073600","45184711","46295822","47406933","48518044","49629155","50740266","51851377","52962488","53073600","54184711","55295822","56406933","57518044","58629155","59740266","60851377","61962488","62073600","63184711","64295822","65406933","66518044","67629155","68740266","69851377","70962488","71073600","72184711","73295822","74406933","75518044","76629155","77740266","78851377","79962488","80073600","81184711","82295822","83406933","84518044","85629155","86740266","87851377","88962488","89073600","90184711","91295822","92406933","93518044","94629155","95740266","96851377","97962488","98073600","99184711"];

    const screens = {
        'loading': document.getElementById('loading-screen'),
        'login': document.getElementById('login-screen'),
        'main': document.getElementById('main-screen'),
        'manage': document.getElementById('manage-screen')
    };
    const adminView = document.getElementById('admin-view');
    const publicView = document.getElementById('public-view');
    const loginBtn = document.getElementById('login-btn');
    const userCodeInput = document.getElementById('user-code');
    const logoutButtons = document.querySelectorAll('#logout-btn-admin, #logout-btn-public');
    const votingAreaContainer = document.getElementById('voting-area-container');
    const adminContestantListContainer = document.getElementById('admin-contestant-list-container');
    const toggleVotingBtn = document.getElementById('toggle-voting-btn');
    const eventRankingBtn = document.getElementById('view-event-ranking-btn');
    const manageContestantsBtn = document.getElementById('manage-contestants-btn');
    const addContestantBtn = document.getElementById('add-contestant-btn');
    const backToAdminBtn = document.getElementById('back-to-admin-btn');
    const resetVotesBtn = document.getElementById('reset-votes-btn');
    const viewVotersBtn = document.getElementById('view-voters-btn');
    const setupCodesBtn = document.getElementById('setup-codes-btn');
    
    const navigateTo = (screenId) => {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenId]?.classList.add('active');
    };

    const disableButtons = (disabled = true) => {
        document.querySelectorAll('button').forEach(b => b.disabled = disabled);
    };

    const fetchState = async () => {
        const { data, error } = await supabase.from('app_state').select('data').eq('id', 1).single();
        if (error) {
            console.error('Errore nel caricamento dello stato:', error);
            alert('Impossibile caricare i dati. Riprova più tardi.');
            return;
        }
        state = data.data;
        initializeVotes();
    };

    const saveState = async () => {
        disableButtons(true);
        const { error } = await supabase.from('app_state').update({ data: state }).eq('id', 1);
        if (error) {
            console.error('Errore nel salvataggio dello stato:', error);
            alert('Si è verificato un errore nel database.');
        }
        disableButtons(false);
    };

    const initializeApp = async () => {
        await fetchState();
        navigateTo('login');
    };

    const initializeVotes = () => {
        if (!state.votes) state.votes = {};
        if (!state.allowed_codes) state.allowed_codes = {};
        state.contestants.forEach(name => {
            if (state.votes[name] === undefined) state.votes[name] = 0;
        });
        if (!state.user_votes) state.user_votes = {};
    };

    const renderUI = () => {
        if (!currentUserCode) return;
        if (currentUserCode.toUpperCase() === 'ROB025490') {
            adminView.style.display = 'block';
            publicView.style.display = 'none';
        } else {
            adminView.style.display = 'none';
            publicView.style.display = 'block';
            document.getElementById('public-welcome').textContent = `Codice Votante: ${currentUserCode}`;
        }
        updateVotingStatus();
        renderAdminContestantList();
    };
    
    const updateVotingStatus = () => {
        const statusDiv = document.getElementById('voting-status');
        toggleVotingBtn.textContent = state.votingOpen ? `Chiudi Votazioni` : `Apri Votazioni`;
        toggleVotingBtn.className = `btn ${state.votingOpen ? 'btn-admin' : 'btn-secondary'}`;
        
        const userHasVoted = state.user_votes[currentUserCode];
        
        if (state.votingOpen) {
            statusDiv.textContent = `VOTAZIONI APERTE`;
            statusDiv.style.color = 'green';
            if (userHasVoted) {
                renderVoteSummary();
            } else {
                renderPublicVotingArea();
            }
        } else {
            statusDiv.textContent = 'VOTAZIONI CHIUSE';
            statusDiv.style.color = 'red';
            renderVoteSummary();
        }
    };
    
    const renderPublicVotingArea = () => {
        let html = `
            <div id="public-voting-area">
                <p>Puoi esprimere fino a <strong>3 preferenze</strong>.</p>
                <div id="contestants-container">
                    <ul class="contestant-list">${state.contestants.map((name, index) => 
                        `<li class="contestant-item"><input type="checkbox" id="c-${index}" value="${name}"><label for="c-${index}">${name}</label></li>`
                    ).join('')}</ul>
                </div>
                <button id="vote-btn" class="btn btn-primary">Invia le preferenze</button>
            </div>`;
        votingAreaContainer.innerHTML = html;
        document.getElementById('vote-btn').addEventListener('click', handleVote);
    };

    const renderVoteSummary = () => {
        const votes = state.user_votes[currentUserCode];
        let summary = votes 
            ? `<ul>${votes.map(v => `<li>${v}</li>`).join('')}</ul>` 
            : `<p>Votazione non effettuata.</p>`;

        votingAreaContainer.innerHTML = `
            <div class="vote-summary">
                <h4>Le tue preferenze inviate</h4>
                ${summary}
            </div>`;
    };
    
    const renderAdminContestantList = () => {
        let html = '<div class="admin-contestant-list">';
        if(state.contestants.length === 0) {
            html += '<p style="text-align:center; color:#666;">Nessun partecipante.</p>';
        } else {
            state.contestants.forEach(name => {
                html += `<div class="admin-contestant-list-item"><span>${name}</span><button class="btn btn-admin btn-sm btn-remove" data-name="${name}">Rimuovi</button></div>`;
            });
        }
        adminContestantListContainer.innerHTML = html + '</div>';
    };

    const handleVote = async () => {
        const selected = document.querySelectorAll('#contestants-container input:checked');
        if (selected.length === 0 || selected.length > 3) return alert('Devi selezionare da 1 a 3 preferenze.');
        if (!confirm('Confermi il tuo voto? L\'azione è definitiva.')) return;
        
        const selectedContestants = Array.from(selected).map(cb => cb.value);

        selectedContestants.forEach(contestant => { 
            state.votes[contestant]++; 
        });
        
        state.user_votes[currentUserCode] = selectedContestants;
        state.allowed_codes[currentUserCode] = "VOTATO";

        await saveState();
        alert('Grazie per aver votato!');
        renderUI();
    };

    loginBtn.addEventListener('click', async () => {
        const codeInput = userCodeInput.value.trim();
        if (codeInput === '') return alert("Inserisci un codice valido.");

        if (codeInput.toUpperCase() === 'ROB025490') {
            currentUserCode = 'ROB025490';
            navigateTo('main');
            renderUI();
            return;
        }

        if (codeInput.length !== 8) return alert("Il codice deve essere composto da 8 cifre.");

        // Controllo interno nello stato centralizzato
        if (!state.allowed_codes || !state.allowed_codes[codeInput]) {
            return alert("Codice errato o non attivo. Clicca su 'Attiva i 500 Codici' nel pannello admin la prima volta.");
        }
        
        if (state.allowed_codes[codeInput] === "VOTATO" && !state.user_votes[codeInput]) {
             state.allowed_codes[codeInput] = "NON_VOTATO";
        }

        currentUserCode = codeInput;
        navigateTo('main');
        renderUI();
    });

    const logout = () => {
        currentUserCode = null;
        userCodeInput.value = '';
        navigateTo('login');
    };
    logoutButtons.forEach(btn => btn.addEventListener('click', logout));

    toggleVotingBtn.addEventListener('click', async () => {
        state.votingOpen = !state.votingOpen;
        await saveState();
        alert(`Le votazioni sono ora ${state.votingOpen ? 'APERTE' : 'CHIUSE'}.`);
        renderUI();
    });
    
    setupCodesBtn.addEventListener('click', async () => {
        if (!confirm("Vuoi attivare e aggiornare i 500 codici nel sistema?")) return;
        
        if (!state.allowed_codes) state.allowed_codes = {};
        PREGENERATED_CODES.forEach(code => {
            if (!state.allowed_codes[code]) {
                state.allowed_codes[code] = "NON_VOTATO";
            }
        });

        await saveState();
        alert("Sincronizzazione completata con successo! I 500 codici sono pronti.");
    });

    viewVotersBtn.addEventListener('click', () => {
        if (!state.allowed_codes) return alert("Codici non ancora attivati.");
        const codici = Object.keys(state.allowed_codes);
        const usati = Object.values(state.allowed_codes).filter(v => v === 'VOTATO').length;
        alert(`Stato dei Codici:\nTotale caricati: ${codici.length}\nCodici usati: ${usati}\nCodici rimanenti: ${codici.length - usati}`);
    });

    manageContestantsBtn.addEventListener('click', () => {
        if (state.votingOpen) return alert("Chiudi le votazioni prima di gestire i partecipanti.");
        navigateTo('manage');
    });

    resetVotesBtn.addEventListener('click', async () => {
        if (confirm("ATTENZIONE! Vuoi resettare tutti i voti ricevuti e azzerare lo stato dei codici?")) {
            state.votes = {};
            state.user_votes = {};
            state.allowed_codes = {};
            PREGENERATED_CODES.forEach(code => {
                state.allowed_codes[code] = "NON_VOTATO";
            });
            initializeVotes();
            await saveState();
            alert("Tutti i dati e le preferenze dei codici sono stati azzerati.");
            renderUI();
        }
    });
    
    eventRankingBtn.addEventListener('click', () => {
        const sorted = Object.entries(state.votes).sort((a, b) => b[1] - a[1]);
        if (sorted.length === 0) return alert("Nessun voto registrato.");
        const message = sorted.map((entry, index) => `${index + 1}. ${entry[0]}: ${entry[1]} voti`).join('\n');
        alert("--- CLASSIFICA CONTEST ---\n\n" + message);
    });

    backToAdminBtn.addEventListener('click', () => navigateTo('main'));

    addContestantBtn.addEventListener('click', async () => {
        const nameInput = document.getElementById('new-contestant-name');
        const newName = nameInput.value.trim();
        if (newName === "") return alert("Il nome non può essere vuoto.");
        if (state.contestants.map(c => c.toLowerCase()).includes(newName.toLowerCase())) return alert("Questo partecipante è già in lista.");
        state.contestants.push(newName);
        initializeVotes();
        await saveState();
        renderAdminContestantList();
        nameInput.value = "";
    });

    adminContestantListContainer.addEventListener('click', async (e) => {
        if (e.target.classList.contains('btn-remove')) {
            const nameToRemove = e.target.dataset.name;
            if (confirm(`Sei sicuro di voler rimuovere ${nameToRemove}?`)) {
                state.contestants = state.contestants.filter(name => name !== nameToRemove);
                if (state.votes[nameToRemove] !== undefined) delete state.votes[nameToRemove];
                await saveState();
                renderAdminContestantList();
            }
        }
    });

    initializeApp();
});
</script>
</body>
</html>
